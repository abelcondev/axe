name: Release

# Builds a standalone release (with bundled Node.js) and publishes it to
# GitHub Releases on every code push to main. Re-running the installer picks up
# the new "latest" release, so `curl ... | install-axe-standalone.sh | bash`
# both installs and updates.

on:
  push:
    branches: [main]
    # Don't cut a release for docs-only or CI-config-only changes.
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'axe-plan.md'
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version (e.g. 0.19.6). Empty = auto patch bump.'
        required: false

permissions:
  contents: write

# Serialize releases so two quick pushes can't race on the same tag.
concurrency:
  group: axe-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          # --ignore-scripts skips the root `prepare` hook (which runs the FULL
          # build incl. webui/web-shell — broken in this fork) and workspace
          # prepare hooks (e.g. vscode generate:notices, which needs a lockfile).
          # Materialize the gitignored lockfile first as a safety net, install
          # without scripts, then apply the ink patch via the direct binary
          # (npx would re-trigger an npm exec that runs the broken prepare).
          npm install --package-lock-only --ignore-scripts
          npm install --ignore-scripts
          node_modules/.bin/patch-package

      - name: Compute version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            NEW="${INPUT#v}"
          else
            LATEST=$(gh release view --json tagName -q .tagName 2>/dev/null | sed 's/^v//' || true)
            if [ -z "$LATEST" ]; then
              LATEST=$(node -p "require('./package.json').version")
            fi
            MA=$(echo "$LATEST" | cut -d. -f1)
            MI=$(echo "$LATEST" | cut -d. -f2)
            PA=$(echo "$LATEST" | cut -d. -f3)
            NEW="$MA.$MI.$((PA + 1))"
          fi
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Releasing v$NEW"

      - name: Bump version
        run: npm pkg set version="${{ steps.ver.outputs.version }}"

      - name: Build CLI + bundle
        run: |
          npm run build -- --cli-only
          npm run bundle
          # prepare:package gates on the web-shell UI (shipped by the npm
          # package), which this fork doesn't build. Stub it so the packaging
          # step still generates dist/cli-entry.js for the standalone archive.
          # `axe serve`'s browser UI is out of scope; the CLI is unaffected.
          mkdir -p dist/web-shell/assets
          printf '<!doctype html><meta charset="utf-8"><title>axe serve</title>' > dist/web-shell/index.html
          npm run prepare:package

      - name: Build standalone archives
        run: node scripts/build-standalone-release.js --version "${{ steps.ver.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            dist/standalone/axe-darwin-arm64.tar.gz \
            dist/standalone/axe-darwin-x64.tar.gz \
            dist/standalone/axe-linux-arm64.tar.gz \
            dist/standalone/axe-linux-x64.tar.gz \
            dist/standalone/axe-win-x64.zip \
            dist/standalone/SHA256SUMS \
            --title "axe v${{ steps.ver.outputs.version }}" \
            --latest \
            --notes "Automated release from \`${{ github.sha }}\`.

          **Install / update:**
          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/abelcondev/axe/main/scripts/installation/install-axe-standalone.sh | bash
          \`\`\`

          Standalone builds bundle a Node.js runtime (Node not required). Targets: darwin arm64/x64, linux arm64/x64, win-x64."
